            <h2>Register Form</h2>

            <!-- Username -->
            <div class="field-group">
                <label for="regUsername">Username</label>
                <div class="input-wrap">
                    <input type="text" id="regUsername" placeholder="Enter Username">
                </div>
            </div>

            <!-- Contact Toggle -->
            <div class="field-group">
                <label>Gmail / Nomor Telepon</label>
                <div class="contact-toggle">
                    <button class="active" id="btnEmail" onclick="switchContact('email')">📧 Email</button>
                    <button id="btnPhone" onclick="switchContact('phone')">📱 No. Telepon</button>
                </div>
                <div class="input-wrap" id="emailWrap">
                    <input type="email" id="regEmail" placeholder="Masukkan Gmail kamu">
                </div>
                <div class="input-wrap" id="phoneWrap" style="display:none">
                    <input type="tel" id="regPhone" placeholder="Contoh: 08xxxxxxxxxx">
                </div>
            </div>

            <!-- Password -->
            <div class="field-group">
                <label for="regPassword">Password</label>
                <div class="input-wrap">
                    <input type="password" id="regPassword" placeholder="Buat Password">
                    <button class="eye-btn" type="button" onclick="togglePassword('regPassword',this)"
                        title="Tampilkan password">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Konfirmasi Password -->
            <div class="field-group">
                <label for="regPasswordConfirm">Konfirmasi Password</label>
                <div class="input-wrap">
                    <input type="password" id="regPasswordConfirm" placeholder="Ulangi Password">
                    <button class="eye-btn" type="button" onclick="togglePassword('regPasswordConfirm',this)"
                        title="Tampilkan password">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
                <div id="passMatchMsg"></div>
            </div>

            <!-- Register Button -->
            <button class="btn-main" onclick="register()">Register</button>

            <!-- Divider -->
            <div class="divider">atau daftar dengan</div>

            <!-- Social Buttons -->
            <div class="social-btns">
                <button class="btn-social btn-google" onclick="loginGoogle()" style="max-width:220px;margin:0 auto">

    <div class="toast" id="toast"></div>

    <script>
        // ── THEME ──
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
            document.getElementById('iconMoon').style.display = t === 'dark' ? 'none' : 'block';
            document.getElementById('iconSun').style.display = t === 'dark' ? 'block' : 'none';
        }
        function toggleTheme() { applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        applyTheme(localStorage.getItem('theme') || 'light');

        // ── EYE TOGGLE ──
        function togglePassword(id, btn) {
            const el = document.getElementById(id), hide = el.type === 'password';
            el.type = hide ? 'text' : 'password';
            btn.innerHTML = hide
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }

        // ── CONTACT TOGGLE ──
        function switchContact(type) {
            const isEmail = type === 'email';
            document.getElementById('emailWrap').style.display = isEmail ? 'flex' : 'none';
            document.getElementById('phoneWrap').style.display = isEmail ? 'none' : 'flex';
            document.getElementById('btnEmail').classList.toggle('active', isEmail);
            document.getElementById('btnPhone').classList.toggle('active', !isEmail);
        }

        // ── PASS MATCH ──
        ['regPassword', 'regPasswordConfirm'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                const p1 = document.getElementById('regPassword').value;
                const p2 = document.getElementById('regPasswordConfirm').value;
                const msg = document.getElementById('passMatchMsg');
                if (!p2) { msg.textContent = ''; return; }
                msg.textContent = p1 === p2 ? '✅ Password cocok' : '❌ Password tidak cocok';
                msg.style.color = p1 === p2 ? '#2e7d32' : '#c62828';
            });
        });

        // ── TOAST ──
        function showToast(msg, dur = 2800) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), dur);
        }

        // ── GOOGLE (Popup method) ──
        const GOOGLE_CLIENT_ID = '128118657440-lrrjbbvq1u90unhflgk8ftbuo6eol0o5.apps.googleusercontent.com';

                function loginGoogle() {
            google.accounts.oauth2.initTokenClient({
                client_id: '128118657440-lrrjbbvq1u90unhflgk8ftbuo6eol0o5.apps.googleusercontent.com',
                scope: 'openid email profile',
                callback: async (response) => {
                    if (response.error) { showToast('Login Google gagal!'); return; }
                    // Ambil info user dari Google
                    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                        headers: { Authorization: 'Bearer ' + response.access_token }
                    });
                    const user = await res.json();
                    // Simpan session
                    localStorage.setItem('userLoggedIn', 'true');
                    localStorage.setItem('userName', user.name);
                    localStorage.setItem('userEmail', user.email);
                    localStorage.setItem('userPhoto', user.picture);
                    showToast('Login berhasil! Halo, ' + user.name);
                    setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
                }
            }).requestAccessToken();
        }

        // ── FACEBOOK ──
        const FACEBOOK_APP_ID = 'YOUR_FACEBOOK_APP_ID';
        window.fbAsyncInit = function () { if (FACEBOOK_APP_ID !== 'YOUR_FACEBOOK_APP_ID') FB.init({ appId: FACEBOOK_APP_ID, cookie: true, xfbml: true, version: 'v19.0' }); };
        function loginFacebook() {
            if (FACEBOOK_APP_ID === 'YOUR_FACEBOOK_APP_ID') { showToast('⚙️ Setup Facebook App ID dulu di kode'); return; }
            FB.login(r => { if (r.authResponse) { FB.api('/me', { fields: 'name,email' }, d => { localStorage.setItem('userUsername', d.name); localStorage.setItem('userEmail', d.email || ''); localStorage.setItem('loginMethod', 'facebook'); showToast('✅ Daftar Facebook berhasil! Halo, ' + d.name); setTimeout(() => window.location.href = 'dashboard.html', 1500); }); } else showToast('❌ Facebook dibatalkan'); }, { scope: 'public_profile,email' });
        }
    </script>
    <script src="user.js"></script>
