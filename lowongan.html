<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lowongan Kerja - PT Indolima Perkasa</title>
    <link rel="stylesheet" href="/dashboard.css">
    <style>
        .dashboard-hero {
            background: linear-gradient(to right, #c0392b 0%, #e74c3c 25%, #ec7063 45%, #f5b7b1 65%, #fdecea 85%, #ffffff 100%);
            padding: 48px 24px 40px;
            text-align: center;
            color: #fff;
        }
        .dashboard-hero img { height: 48px; margin-bottom: 16px; }
        .dashboard-hero h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
        .dashboard-hero p { font-size: 0.88rem; opacity: 0.85; }

        .dash-topbar {
            background: #e74c3c;
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .dash-topbar span { color: #fff; font-size: 0.82rem; font-weight: 600; }
        .btn-back {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            text-decoration: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.25); }

        .container { max-width: 760px; margin: -20px auto 0; padding: 0 20px 60px; position: relative; }

        .search-bar { display: flex; gap: 12px; margin-bottom: 18px; }
        .search-bar input {
            flex: 1;
            padding: 13px 18px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            background: var(--card);
            color: var(--text);
            box-shadow: var(--shadow);
        }
        .search-bar input:focus { border-color: var(--primary); }

        .filter-row { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
        .filter-btn {
            padding: 7px 18px;
            border-radius: 20px;
            border: 1.5px solid var(--primary);
            background: var(--card);
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); color: #fff; }

        .lowongan-list { display: flex; flex-direction: column; gap: 14px; }

        .job-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }
        .job-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 4px;
            background: #e74c3c;
        }
        .job-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(139,0,0,0.15);
            border-color: var(--primary);
        }

        .job-info { flex: 1; min-width: 0; }
        .card-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            margin-bottom: 10px;
            margin-right: 6px;
        }
        .badge-aktif { background: #e8f5e9; color: #2e7d32; }
        .badge-fulltime { background: #fdecea; color: #b71c1c; }
        .job-info h3 { margin: 0 0 6px; font-size: 1.05rem; color: var(--text); font-weight: 700; }
        .card-meta { font-size: 0.82rem; color: var(--subtext); margin-bottom: 8px; }
        .card-desc {
            font-size: 0.85rem;
            color: var(--subtext);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-daftar {
            flex-shrink: 0;
            padding: 11px 22px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn-daftar:hover { background: #c0392b; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--subtext); }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.4; }
        .loading { text-align: center; padding: 60px; color: var(--primary); }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 600px) {
            .job-card { flex-direction: column; align-items: stretch; text-align: left; }
            .btn-daftar { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="dash-topbar">
        <span>Lowongan Kerja</span>
        <a class="btn-back" href="/dashboard.html">← Kembali</a>
    </div>

    <div class="dashboard-hero">
        <img src="/logo_baru.png" alt="Logo Indolima">
        <h1>Lowongan Kerja Tersedia</h1>
        <p>Pilih posisi yang sesuai dengan minat dan keahlianmu</p>
    </div>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari posisi pekerjaan..." oninput="filterLowongan()">
        </div>
        <div class="filter-row" id="filterRow">
            <button class="filter-btn active" onclick="setFilter('semua', this)">Semua</button>
            <button class="filter-btn" onclick="setFilter('Full-time', this)">Full-time</button>
            <button class="filter-btn" onclick="setFilter('Part-time', this)">Part-time</button>
            <button class="filter-btn" onclick="setFilter('Kontrak', this)">Kontrak</button>
        </div>
        <div id="lowonganContainer" class="loading">Memuat lowongan...</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function applyTheme(t) { document.documentElement.setAttribute("data-theme", t); localStorage.setItem("theme", t); }
        applyTheme(localStorage.getItem("theme") || "light");

        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:3000'
            : 'https://avid-widget-revoke.ngrok-free.dev';

        let allLowongan = [];
        let activeFilter = 'semua';

        async function loadLowongan() {
            try {
                const res = await fetch(API_BASE + '/api/lowongan');
                const data = await res.json();
                if (data.success) {
                    allLowongan = data.data;
                    renderLowongan(allLowongan);
                } else {
                    showEmpty('Gagal memuat lowongan');
                }
            } catch(e) {
                showEmpty('Tidak dapat terhubung ke server');
            }
        }

        function renderLowongan(list) {
            const container = document.getElementById('lowonganContainer');
            if (!list.length) { showEmpty('Tidak ada lowongan tersedia saat ini'); return; }
            container.className = 'lowongan-list';
            container.innerHTML = list.map(l => `
                <div class="job-card" onclick="pilihLowongan(${l.id}, '${l.posisi.replace(/'/g, "\\'")}')">
                    <div class="job-info">
                        <span class="card-badge badge-aktif">${l.status}</span>
                        <span class="card-badge badge-fulltime">${l.tipe}</span>
                        <h3>${l.posisi}</h3>
                        <div class="card-meta">📍 ${l.lokasi}</div>
                        <p class="card-desc">${l.deskripsi || 'Lihat detail posisi ini'}</p>
                    </div>
                    <button class="btn-daftar">Daftar Sekarang</button>
                </div>
            `).join('');
        }

        function setFilter(tipe, btn) {
            activeFilter = tipe;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterLowongan();
        }

        function filterLowongan() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allLowongan;
            if (activeFilter !== 'semua') filtered = filtered.filter(l => l.tipe === activeFilter);
            if (q) filtered = filtered.filter(l => l.posisi.toLowerCase().includes(q) || (l.deskripsi||'').toLowerCase().includes(q));
            renderLowongan(filtered);
        }

        function pilihLowongan(id, posisi) {
            sessionStorage.setItem('selectedLowonganId', id);
            sessionStorage.setItem('selectedPosisi', posisi);
            showToast('Posisi dipilih: ' + posisi);
            setTimeout(() => { window.location.href = 'formpelamar.html'; }, 800);
        }

        function showEmpty(msg) {
            const container = document.getElementById('lowonganContainer');
            container.className = '';
            container.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>${msg}</p></div>`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        loadLowongan();
    </script>
</body>
</html>
